networks:
  continuum:
    driver: bridge

services:
  backend:
    build:
      context: ./backend/core-api
      dockerfile: Dockerfile
    ports:
      - "10000:10000"
    environment:
      ENV: ${ENV}
      LOG_LEVEL: ${LOG_LEVEL}
    volumes:
      - ./backend/core-api/logs:/app/logs
    networks:
      - continuum
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend/platform-web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: ${BACKEND_URL}
    volumes:
      - ./frontend/platform-web/logs:/app/logs
    networks:
      - continuum
    depends_on:
      - backend
    restart: unless-stopped
